server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SSE stream: no buffering, long read timeout so events flow in real time.
    location /api/events {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Everything else under /api → the FastAPI backend (same-origin from the browser).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25m;
    }

    # SPA + Web Share Target: the service worker intercepts POST /share-target;
    # if it isn't active yet, fall back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
