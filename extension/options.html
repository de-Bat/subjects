<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Subjects — Options</title>
    <style>
      body { font: 14px system-ui, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; color: #0f172a; }
      h1 { font-size: 18px; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; }
      .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
      button { margin-top: 18px; padding: 8px 14px; background: #4f46e5; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
      #status { margin-top: 12px; color: #059669; height: 18px; }
      small { color: #64748b; }
    </style>
  </head>
  <body>
    <h1>Send to Subjects</h1>
    <label for="apiBase">API base URL</label>
    <input id="apiBase" type="text" placeholder="http://192.168.1.10:8000" />
    <small>The address of your Subjects API (no trailing slash).</small>

    <label for="token">Bearer token</label>
    <input id="token" type="password" placeholder="SUBJECTS_TOKEN" />

    <div class="row">
      <input id="screenshot" type="checkbox" />
      <label for="screenshot" style="margin: 0; font-weight: 400">Attach a screenshot of the visible tab</label>
    </div>

    <button id="save">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
