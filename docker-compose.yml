services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-subjects}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subjects}
      POSTGRES_DB: ${POSTGRES_DB:-subjects}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subjects} -d ${POSTGRES_DB:-subjects}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-subjects}:${POSTGRES_PASSWORD:-subjects}@postgres:5432/${POSTGRES_DB:-subjects}
      DATABASE_DSN: postgresql://${POSTGRES_USER:-subjects}:${POSTGRES_PASSWORD:-subjects}@postgres:5432/${POSTGRES_DB:-subjects}
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./api
    command: ["python", "-m", "app.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-subjects}:${POSTGRES_PASSWORD:-subjects}@postgres:5432/${POSTGRES_DB:-subjects}
      DATABASE_DSN: postgresql://${POSTGRES_USER:-subjects}:${POSTGRES_PASSWORD:-subjects}@postgres:5432/${POSTGRES_DB:-subjects}
    volumes:
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api

  meilisearch:
    image: getmeili/meilisearch:v1.9
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me-meili-key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  appdata:
  meilidata:
